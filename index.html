<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Treino — Leonardo Pereira</title>
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #181818;
    --surface2: #222222;
    --border: #2e2e2e;
    --accent: #f5a623;
    --accent2: #e8890a;
    --text: #f0f0f0;
    --muted: #888;
    --green: #4ade80;
    --danger: #f87171;
    --radius: 12px;
    --font: 'Arial', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; padding-bottom: 100px; }

  /* HEADER */
  .header { background: var(--surface); border-bottom: 2px solid var(--accent); padding: 16px 20px 12px; position: sticky; top: 0; z-index: 100; }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
  .logo { font-size: 11px; color: var(--accent); font-weight: 800; letter-spacing: 2px; text-transform: uppercase; }
  .name { font-size: 18px; font-weight: 800; color: var(--text); }
  .date-badge { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .reset-btn { background: none; border: 1px solid var(--border); color: var(--muted); font-size: 11px; padding: 4px 10px; border-radius: 20px; cursor: pointer; }
  .reset-btn:active { background: var(--border); }

  /* WEEK NAV */
  .week-bar { display: flex; gap: 6px; padding: 14px 20px 0; overflow-x: auto; scrollbar-width: none; }
  .week-bar::-webkit-scrollbar { display: none; }
  .day-chip { flex: 0 0 auto; background: var(--surface); border: 1.5px solid var(--border); color: var(--muted); border-radius: 20px; padding: 7px 16px; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.15s; position: relative; text-align: center; }
  .day-chip.active { background: var(--accent); border-color: var(--accent); color: #000; }
  .day-chip.rest { background: #1a2233; border-color: #2e3a52; color: #7c93c2; }
  .day-chip.rest.active { background: #3a4a6e; border-color: #3a4a6e; color: #fff; }
  .day-chip .dot { width: 6px; height: 6px; background: var(--green); border-radius: 50%; position: absolute; top: 4px; right: 4px; }

  /* BANNER */
  .today-banner { margin: 16px 20px 0; background: linear-gradient(135deg, #1a1300 0%, #2a1f00 100%); border: 1px solid var(--accent); border-radius: var(--radius); padding: 14px 18px; display: flex; align-items: center; justify-content: space-between; }
  .today-label { font-size: 11px; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }
  .today-title { font-size: 20px; font-weight: 900; margin-top: 2px; }
  .today-focus { font-size: 12px; color: var(--muted); margin-top: 3px; }
  .today-progress { text-align: right; }
  .pct { font-size: 28px; font-weight: 900; color: var(--accent); line-height: 1; }
  .pct-label { font-size: 10px; color: var(--muted); }

  /* WEEK PROGRESS */
  .week-progress-wrap { margin: 12px 20px 0; }
  .week-progress-label { font-size: 11px; color: var(--muted); margin-bottom: 6px; display: flex; justify-content: space-between; }
  .week-progress-track { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .week-progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.4s ease; }

  /* EXERCISE CARD */
  .section-label { font-size: 10px; color: var(--accent); letter-spacing: 2px; font-weight: 800; text-transform: uppercase; padding: 20px 20px 8px; }
  .ex-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin: 0 20px 10px; overflow: hidden; transition: border-color 0.2s; }
  .ex-card.completed { border-color: var(--green); }
  .cardio-card { border-style: dashed; }
  .cardio-card .ex-num { background: var(--surface2); }
  .cardio-card.completed .ex-num { background: var(--green); color:#000; }
  .ex-header { display: flex; align-items: center; padding: 14px 16px; cursor: pointer; gap: 12px; }
  .ex-num { width: 26px; height: 26px; flex: 0 0 26px; background: var(--surface2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800; color: var(--muted); }
  .ex-card.completed .ex-num { background: var(--green); color: #000; }
  .ex-info { flex: 1; }
  .ex-name { font-size: 14px; font-weight: 700; line-height: 1.3; }
  .ex-meta { font-size: 11px; color: var(--muted); margin-top: 3px; }
  .video-link {
    display: inline-block; margin-top: 5px;
    font-size: 11px; color: var(--accent); font-weight: 700;
    text-decoration: none; border: 1px solid var(--accent);
    border-radius: 12px; padding: 2px 10px;
  }
  .video-link:active { background: var(--accent); color: #000; }
  .ex-chevron { color: var(--muted); font-size: 18px; transition: transform 0.2s; }
  .ex-card.open .ex-chevron { transform: rotate(180deg); }

  /* SERIES */
  .series-wrap { display: none; padding: 0 16px 16px; border-top: 1px solid var(--border); }
  .ex-card.open .series-wrap { display: block; }
  .series-header { display: grid; grid-template-columns: 32px 1fr 1fr 36px; gap: 8px; padding: 10px 0 6px; font-size: 10px; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
  .series-row { display: grid; grid-template-columns: 32px 1fr 1fr 36px; gap: 8px; align-items: center; margin-bottom: 8px; }
  .serie-badge { width: 28px; height: 28px; border-radius: 50%; border: 1.5px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; color: var(--muted); }
  .serie-badge.done { background: var(--accent); border-color: var(--accent); color: #000; }
  .serie-input { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 16px; font-weight: 700; text-align: center; padding: 10px 6px; width: 100%; -webkit-appearance: none; }
  .serie-input:focus { outline: none; border-color: var(--accent); }
  .serie-input.filled { border-color: var(--accent); background: #1a1300; color: var(--accent); }
  .check-btn { width: 32px; height: 32px; border-radius: 50%; border: 1.5px solid var(--border); background: none; color: var(--muted); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .check-btn.done { background: var(--green); border-color: var(--green); color: #000; }

  /* PIPS */
  .pips { display: flex; gap: 4px; margin-top: 10px; }
  .pip { flex: 1; height: 4px; border-radius: 2px; background: var(--border); transition: background 0.3s; }
  .pip.done { background: var(--accent); }
  .pip.warmup { background: #444; }

  /* NOTES */
  .note-label { font-size: 11px; color: var(--muted); margin: 10px 0 4px; }
  .note-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 13px; padding: 10px; resize: none; font-family: var(--font); }
  .note-input:focus { outline: none; border-color: var(--accent); }

  /* PROGRESSION BADGE */
  .prog-badge { background: #0a1f0a; border: 1px solid var(--green); border-radius: 8px; padding: 8px 12px; font-size: 11px; color: var(--green); margin-top: 8px; display: none; }
  .prog-badge.show { display: block; }

  /* REST SCREEN */
  .rest-screen { padding: 40px 20px; text-align: center; }
  .rest-icon { font-size: 56px; margin-bottom: 16px; }
  .rest-title { font-size: 24px; font-weight: 900; }
  .rest-sub { color: var(--muted); font-size: 14px; margin-top: 8px; }

  /* TIP BOX */
  .tip-box { margin: 0 20px 10px; background: var(--surface2); border-left: 3px solid var(--accent); border-radius: 0 8px 8px 0; padding: 10px 14px; font-size: 12px; color: var(--muted); line-height: 1.6; }
  .tip-box strong { color: var(--text); }
  .tip-box summary { cursor: pointer; list-style: none; color: var(--text); }
  .tip-box summary::-webkit-details-marker { display: none; }
  .tip-box summary::after { content: ' ▾'; color: var(--accent); }
  .tip-box[open] summary::after { content: ' ▴'; }

  /* HISTORY MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 200; padding: 20px; overflow-y: auto; }
  .modal-overlay.open { display: flex; align-items: flex-start; }
  .modal { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); width: 100%; max-width: 500px; margin: auto; padding: 20px; }
  .modal-title { font-size: 16px; font-weight: 800; margin-bottom: 16px; }
  .modal-close { float: right; background: none; border: none; color: var(--muted); font-size: 22px; cursor: pointer; }
  .hist-entry { border-bottom: 1px solid var(--border); padding: 10px 0; font-size: 13px; }
  .hist-date { font-size: 10px; color: var(--accent); font-weight: 700; margin-bottom: 4px; }

  /* Semana (nível 1) */
  .hist-week { margin-bottom: 8px; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .hist-week-summary {
    cursor: pointer; list-style: none; padding: 12px 14px;
    font-size: 13px; color: var(--text); font-weight: 800;
    background: var(--surface2); display: flex; justify-content: space-between; align-items: center;
  }
  .hist-week-summary::-webkit-details-marker { display: none; }
  .hist-week-summary .chevron { color: var(--muted); transition: transform 0.2s; }
  .hist-week[open] .hist-week-summary .chevron { transform: rotate(180deg); }
  .hist-week-body { padding: 6px 10px 10px; }

  /* Dia (nível 2) */
  .hist-day { margin-bottom: 6px; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .hist-day-summary {
    cursor: pointer; list-style: none; padding: 10px 12px;
    display: flex; align-items: center; gap: 8px; background: var(--surface);
  }
  .hist-day-summary::-webkit-details-marker { display: none; }
  .hist-day-badge {
    background: var(--accent); color: #000; font-size: 10px; font-weight: 800;
    border-radius: 6px; padding: 2px 7px; flex-shrink: 0;
  }
  .hist-day-badge.rest { background: #3a4a6e; color: #fff; }
  .hist-day-meta { flex: 1; font-size: 12px; font-weight: 700; color: var(--text); }
  .hist-day-date { font-size: 10px; color: var(--muted); }
  .hist-day-chevron { color: var(--muted); font-size: 14px; transition: transform 0.2s; }
  .hist-day[open] .hist-day-chevron { transform: rotate(180deg); }
  .hist-day-body { padding: 8px 12px 12px; background: var(--bg); }

  /* Exercício (nível 3) */
  .hist-ex { margin-bottom: 10px; }
  .hist-ex-name { font-size: 12px; font-weight: 700; color: var(--text); margin-bottom: 3px; }
  .hist-ex-sets { font-size: 11px; color: var(--muted); }
  .ref-load {
    margin-top: 5px; font-size: 11px; font-weight: 700;
    color: var(--accent); background: #1a1300;
    border: 1px solid var(--accent); border-radius: 6px;
    padding: 4px 8px; display: inline-block;
  }
  .ref-load-prog { color: var(--green); background: #0a1f0a; border-color: var(--green); }
  .hist-note {
    margin-top: 4px; font-size: 11px; color: var(--muted);
    font-style: italic; background: var(--surface2);
    border-radius: 6px; padding: 4px 8px;
  }

  /* Guia de carga (topo do modal) */
  /* Guia de cargas por treino (colapsável) */
  .guide-treino-row { border: 1px solid var(--border); border-radius: 10px; margin-bottom: 6px; overflow: hidden; }
  .guide-treino-header {
    display: flex; align-items: center; gap: 10px; padding: 10px 12px;
    cursor: pointer; background: var(--surface2);
  }
  .guide-treino-header:active { background: var(--border); }
  .guide-treino-badge {
    width: 28px; height: 28px; flex-shrink: 0;
    background: var(--accent); color: #000;
    border-radius: 8px; font-size: 12px; font-weight: 900;
    display: flex; align-items: center; justify-content: center;
  }
  .guide-treino-meta { font-size: 12px; font-weight: 700; color: var(--text); }
  .guide-treino-chevron { color: var(--muted); font-size: 14px; transition: transform 0.2s; margin-left: auto; }
  .guide-treino-row.open .guide-treino-chevron { transform: rotate(180deg); }
  .guide-treino-body { display: none; padding: 8px 12px 12px; background: var(--bg); }
  .guide-treino-row.open .guide-treino-body { display: block; }

  .guide-ex-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 1px solid var(--border); }
  .guide-ex-row:last-child { border-bottom: none; }
  .guide-ex-name { font-size: 12px; color: var(--text); flex: 1; margin-right: 8px; }
  .guide-ex-kg { font-size: 13px; font-weight: 800; color: var(--accent); flex-shrink: 0; }
  .guide-ex-up { color: var(--green); }

  /* FAB */
  .fab { position: fixed; bottom: 24px; right: 20px; background: var(--accent); color: #000; border: none; border-radius: 50%; width: 52px; height: 52px; font-size: 22px; cursor: pointer; box-shadow: 0 4px 20px rgba(245,166,35,0.4); display: flex; align-items: center; justify-content: center; z-index: 99; }
  .fab:active { transform: scale(0.94); }

  /* ══ REST TIMER OVERLAY ══ */
  .timer-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 300;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 30px;
  }
  .timer-overlay.open { display: flex; }

  .timer-label {
    font-size: 12px; color: var(--accent); font-weight: 800;
    text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px;
  }
  .timer-ex-name {
    font-size: 15px; color: var(--muted); margin-bottom: 28px;
    max-width: 280px; line-height: 1.4;
  }

  /* SVG ring */
  .timer-ring-wrap { position: relative; width: 200px; height: 200px; margin-bottom: 28px; }
  .timer-ring-wrap svg { transform: rotate(-90deg); }
  .timer-ring-bg { fill: none; stroke: var(--border); stroke-width: 10; }
  .timer-ring-fill { fill: none; stroke: var(--accent); stroke-width: 10; stroke-linecap: round; transition: stroke-dashoffset 1s linear; }
  .timer-ring-fill.danger { stroke: var(--danger); }
  .timer-digits {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 52px; font-weight: 900; color: var(--text);
    letter-spacing: -2px;
  }
  .timer-digits.danger { color: var(--danger); }

  .timer-next {
    font-size: 13px; color: var(--muted); margin-bottom: 24px;
  }
  .timer-next strong { color: var(--text); }

  .timer-btns { display: flex; gap: 12px; }
  .timer-btn {
    border: none; border-radius: 30px; padding: 14px 28px;
    font-size: 15px; font-weight: 800; cursor: pointer;
  }
  .timer-btn-skip { background: var(--surface2); color: var(--muted); }
  .timer-btn-skip:active { background: var(--border); }
  .timer-btn-add { background: var(--surface2); color: var(--text); }
  .timer-btn-add:active { background: var(--border); }
  .timer-btn-stop { background: var(--danger); color: #fff; }
  .timer-btn-stop:active { opacity: 0.8; }

  .timer-preset-row {
    display: flex; gap: 8px; margin-bottom: 20px;
  }
  .timer-preset {
    flex: 1; background: var(--surface2); border: 1px solid var(--border);
    color: var(--muted); border-radius: 20px; padding: 8px 4px;
    font-size: 13px; font-weight: 700; cursor: pointer;
  }
  .timer-preset.active { border-color: var(--accent); color: var(--accent); }
  .timer-preset:active { background: var(--border); }

  /* ══ CELEBRATION MODAL ══ */
  .celeb-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 400;
    align-items: center; justify-content: center;
    padding: 24px;
  }
  .celeb-overlay.open { display: flex; }
  .celeb-card {
    background: linear-gradient(160deg, #1a1300 0%, #0d0d0d 70%);
    border: 1.5px solid var(--accent);
    border-radius: 20px;
    padding: 36px 28px;
    text-align: center;
    max-width: 340px;
    width: 100%;
    box-shadow: 0 0 50px rgba(245,166,35,0.25);
    animation: celebPop 0.35s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes celebPop { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .celeb-emoji { font-size: 64px; margin-bottom: 8px; }
  .celeb-title { font-size: 24px; font-weight: 900; color: var(--text); margin-bottom: 6px; }
  .celeb-sub { font-size: 14px; color: var(--muted); margin-bottom: 20px; line-height: 1.5; }
  .celeb-badge {
    display: inline-block; font-size: 11px; font-weight: 800;
    color: #000; background: var(--accent);
    letter-spacing: 2px; border-radius: 20px;
    padding: 6px 18px; margin-bottom: 24px;
  }
  .celeb-btns { display: flex; flex-direction: column; gap: 10px; }
  .celeb-btn { border: none; border-radius: 30px; padding: 14px; font-size: 15px; font-weight: 800; cursor: pointer; }
  .celeb-btn-share { background: var(--accent); color: #000; }
  .celeb-btn-share:active { opacity: 0.85; }
  .celeb-btn-close { background: none; color: var(--muted); border: 1px solid var(--border); }
  .celeb-btn-close:active { background: var(--surface2); }

  /* Chart — lista colapsável de exercícios */
  .chart-ex-row {
    border: 1px solid var(--border); border-radius: 10px;
    margin-bottom: 8px; overflow: hidden;
  }
  .chart-ex-row-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 14px; cursor: pointer; background: var(--surface2);
    gap: 10px;
  }
  .chart-ex-row-header:active { background: var(--border); }
  .chart-ex-row-name { font-size: 13px; font-weight: 700; color: var(--text); flex: 1; }
  .chart-ex-row-treino { font-size: 10px; color: var(--accent); font-weight: 800; }
  .chart-ex-row-chevron { color: var(--muted); font-size: 14px; transition: transform 0.2s; flex-shrink: 0; }
  .chart-ex-row.open .chart-ex-row-chevron { transform: rotate(180deg); }
  .chart-ex-row-body { display: none; padding: 12px; background: var(--bg); }
  .chart-ex-row.open .chart-ex-row-body { display: block; }
  .chart-no-data { text-align: center; color: var(--muted); font-size: 12px; padding: 12px 0; }

  .hidden { display: none !important; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-top">
    <div>
      <div class="logo">KV Coach</div>
      <div class="name">Leonardo Pereira</div>
    </div>
    <button class="reset-btn" onclick="confirmReset()">⟳ Limpar semana</button>
  </div>
  <div class="date-badge" id="dateLabel"></div>
</div>

<!-- WEEK NAV -->
<div class="week-bar" id="weekBar"></div>

<!-- TODAY BANNER -->
<div class="today-banner" id="todayBanner">
  <div>
    <div class="today-label">Treino de Hoje</div>
    <div class="today-title" id="todayTitle">—</div>
    <div class="today-focus" id="todayFocus"></div>
  </div>
  <div class="today-progress">
    <div class="pct" id="todayPct">0%</div>
    <div class="pct-label">completo</div>
  </div>
</div>

<div class="week-progress-wrap">
  <div class="week-progress-label">
    <span>Semana atual</span>
    <span id="weekLabel">0/7 dias</span>
  </div>
  <div class="week-progress-track">
    <div class="week-progress-fill" id="weekFill" style="width:0%"></div>
  </div>
</div>

<!-- CONTENT -->
<div id="content"></div>

<!-- FABs -->
<button class="fab" onclick="openHistory()" title="Histórico" style="right:84px">📋</button>
<button class="fab" onclick="openCharts()" title="Evolução" style="right:20px">📈</button>

<!-- HISTORY MODAL -->
<div class="modal-overlay" id="histModal">
  <div class="modal">
    <div class="modal-title">📋 Histórico <button class="modal-close" onclick="closeHistory()">×</button></div>
    <div id="histContent"></div>
  </div>
</div>

<!-- CHART MODAL -->
<div class="modal-overlay" id="chartModal">
  <div class="modal">
    <div class="modal-title">📈 Evolução de Carga <button class="modal-close" onclick="closeCharts()">×</button></div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:12px">Toque em um exercício para ver a evolução de carga semana a semana.</div>
    <div id="chartExList"></div>
  </div>
</div>

<!-- REST TIMER OVERLAY -->
<div class="timer-overlay" id="timerOverlay">
  <div class="timer-label">⏱ Descanso</div>
  <div class="timer-ex-name" id="timerExName"></div>

  <div class="timer-preset-row">
    <button class="timer-preset" onclick="setTimerPreset(60)">1:00</button>
    <button class="timer-preset active" onclick="setTimerPreset(90)">1:30</button>
    <button class="timer-preset" onclick="setTimerPreset(120)">2:00</button>
    <button class="timer-preset" onclick="setTimerPreset(150)">2:30</button>
  </div>

  <div class="timer-ring-wrap">
    <svg width="200" height="200" viewBox="0 0 200 200">
      <circle class="timer-ring-bg" cx="100" cy="100" r="88"/>
      <circle class="timer-ring-fill" id="timerRing" cx="100" cy="100" r="88"
        stroke-dasharray="552.9" stroke-dashoffset="0"/>
    </svg>
    <div class="timer-digits" id="timerDigits">1:30</div>
  </div>

  <div class="timer-next" id="timerNext"></div>

  <div class="timer-btns">
    <button class="timer-btn timer-btn-add" onclick="addTimerSeconds(30)">+30s</button>
    <button class="timer-btn timer-btn-skip" onclick="skipTimer()">Pular ⏭</button>

// Gera link de busca no YouTube para um exercício
function videoLinkFor(ex) {
  if (ex.video) return ex.video;
  const query = encodeURIComponent(ex.name + ' execução exercício');
  return 'https://www.youtube.com/results?search_query=' + query;
}

const DAY_NAMES = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
const CIRCUMFERENCE = 2 * Math.PI * 88; // 552.9

// ══════════════════════════════════════════════
//  TIMER STATE (timestamp-based — survives iOS background)
// ══════════════════════════════════════════════
let timerInterval = null;
let timerTotal = 90;
let timerRemaining = 90;
let timerEndAt = null;   // epoch ms when timer should fire
let timerExLabel = '';

function setTimerPreset(secs) {
  timerTotal = secs;
  if (timerEndAt) {
    // Timer running: shift end time
    timerEndAt = Date.now() + secs * 1000;
  } else {
    timerRemaining = secs;
  }
  document.querySelectorAll('.timer-preset').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  updateTimerDisplay();
}

function startTimer(exName, nextExName, seconds) {
  if (timerInterval) clearInterval(timerInterval);
  timerTotal = seconds;
  timerRemaining = seconds;
  timerEndAt = Date.now() + seconds * 1000;
  timerExLabel = exName;

  document.querySelectorAll('.timer-preset').forEach(b => {
    b.classList.toggle('active',
      (seconds === 60 && b.textContent === '1:00') ||
      (seconds === 90 && b.textContent === '1:30') ||
      (seconds === 120 && b.textContent === '2:00') ||
      (seconds === 150 && b.textContent === '2:30'));
  });

  document.getElementById('timerExName').textContent = '✅ Série concluída · ' + exName;
  const nextEl = document.getElementById('timerNext');
  nextEl.innerHTML = nextExName
    ? 'Próxima série: <strong>' + nextExName + '</strong>'
    : '<strong>Última série!</strong> 🏁';

  document.getElementById('timerOverlay').classList.add('open');
  updateTimerDisplay();

  timerInterval = setInterval(timerTick, 250); // 250ms for smooth display
}

function timerTick() {
  if (!timerEndAt) return;
  const remaining = Math.max(0, Math.round((timerEndAt - Date.now()) / 1000));
  timerRemaining = remaining;
  updateTimerDisplay();
  if (remaining <= 0) {
    clearInterval(timerInterval);
    timerInterval = null;
    timerEndAt = null;
    onTimerEnd();
  }
}

// When page becomes visible again, immediately recalculate remaining time
document.addEventListener('visibilitychange', () => {
  if (!document.hidden && timerEndAt) {
    timerTick(); // instant update without waiting for next tick
  }
});

function updateTimerDisplay() {
  const m = Math.floor(timerRemaining / 60);
  const s = timerRemaining % 60;
  const display = m + ':' + String(s).padStart(2,'0');
  const digits = document.getElementById('timerDigits');
  const ring = document.getElementById('timerRing');
  if (!digits || !ring) return;
  digits.textContent = display;

  const pct = timerTotal > 0 ? timerRemaining / timerTotal : 0;
  const offset = CIRCUMFERENCE * (1 - pct);
  ring.style.strokeDashoffset = offset;

  const danger = timerRemaining <= 10;
  digits.classList.toggle('danger', danger);
  ring.classList.toggle('danger', danger);
}

function onTimerEnd() {
  if (navigator.vibrate) navigator.vibrate([300, 100, 300]);
  const overlay = document.getElementById('timerOverlay');
  overlay.style.background = 'rgba(74,222,128,0.15)';
  setTimeout(() => {
    overlay.style.background = '';
    setTimeout(stopTimer, 1500);
  }, 400);
}

function addTimerSeconds(n) {
  timerRemaining = Math.min(600, timerRemaining + n);
  if (timerEndAt) timerEndAt = Date.now() + timerRemaining * 1000;
  updateTimerDisplay();
}

function skipTimer() {
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = null;
  timerEndAt = null;
  stopTimer();
}

function stopTimer() {
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = null;
  timerEndAt = null;
  document.getElementById('timerOverlay').classList.remove('open');
}

// ══════════════════════════════════════════════
//  APP STATE
// ══════════════════════════════════════════════
let state = {};
let openCards = {};
let currentDay = new Date().getDay();

const WEEK_KEY = () => {
  const now = new Date();
  const day = now.getDay();
  const monday = new Date(now);
  monday.setDate(now.getDate() - (day === 0 ? 6 : day - 1));
  return 'week_' + localISODate(monday);
};

function storageKey() { return 'treino_leo_' + WEEK_KEY(); }
function loadState() { try { state = JSON.parse(localStorage.getItem(storageKey()) || '{}'); } catch(e) { state = {}; } }
function saveState() { localStorage.setItem(storageKey(), JSON.stringify(state)); }
function setSerieData(exId, serie, field, value) {
  const k = exId + '_' + serie;
  if (!state[k]) state[k] = {};
  state[k][field] = value;
  state[k].date = todayISO();
  saveState();
}
function getSerieData(exId, serie) { return state[exId + '_' + serie] || {}; }

// Retorna a data no formato YYYY-MM-DD usando o horário LOCAL do dispositivo
// (toISOString() usa UTC e "vira o dia" errado para fusos negativos como o do Brasil)
function localISODate(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, '0');
  const d = String(date.getDate()).padStart(2, '0');
  return y + '-' + m + '-' + d;
}
function todayISO() { return localISODate(new Date()); }
// cardio pode ser: true (formato antigo), { done: true, date: 'YYYY-MM-DD' } (novo), ou falsy
function isCardioDone(dow, src) {
  const v = (src || state)['cardio_' + dow];
  return v === true || (v && v.done === true);
}
function cardioDate(dow, src) {
  const v = (src || state)['cardio_' + dow];
  if (!v) return null;
  return v.date || null; // antigo formato não tem data
}
function formatDateBR(iso) {
  const [y,m,d] = iso.split('-');
  return d + '/' + m + '/' + y;
}

// ══════════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════════
function init() {
  loadState();
  renderDateLabel();
  renderWeekBar();
  renderContent(currentDay);
}

function renderDateLabel() {
  document.getElementById('dateLabel').textContent =
    new Date().toLocaleDateString('pt-BR', {weekday:'long',day:'numeric',month:'long',year:'numeric'});
}

function renderWeekBar() {
  const bar = document.getElementById('weekBar');
  bar.innerHTML = '';
  [1,2,3,4,5,6,0].forEach(dow => {
    const training = SCHEDULE[dow];
    const chip = document.createElement('div');
    chip.className = 'day-chip' + (dow === currentDay ? ' active' : '') + (!training ? ' rest' : '');
    chip.innerHTML = DAY_NAMES[dow] + (training ? '<br><small>' + training + '</small>' : '<br><small>Descanso</small>');
    if (isDayDone(dow)) chip.innerHTML += '<span class="dot"></span>';
    chip.onclick = () => switchDay(dow);
    bar.appendChild(chip);
  });
}

function isDayDone(dow) {
  const t = SCHEDULE[dow];
  const cardioDone = isCardioDone(dow);
  if (!t) {
    // Rest day: only cardio defines completion
    return cardioDone;
  }
  const exDone = TREINOS[t].exercises.every(e => {
    for (let s = 1; s <= e.sets; s++) { if (!getSerieData(e.id, s).done) return false; }
    return true;
  });
  const absDone = ABS_DAYS.includes(dow)
    ? getAbsForDay(dow).every(e => {
        for (let s = 1; s <= e.sets; s++) { if (!getSerieData(e.id, s).done) return false; }
        return true;
      })
    : true;
  return exDone && absDone && cardioDone;
}

function checkDayCompletion() {
  if (!isDayDone(currentDay)) return;
  const celebKey = 'celebrated_' + currentDay;
  if (state[celebKey]) return; // já celebrado hoje, não repete
  state[celebKey] = true;
  saveState();
  showCelebration(currentDay);
}

function showCelebration(dow) {
  const training = SCHEDULE[dow];
  const sub = training
    ? 'Você concluiu o ' + TREINOS[training].label + ' (' + TREINOS[training].focus + ')!'
    : 'Cardio do dia de descanso completo. Recuperação em dia!';
  document.getElementById('celebSub').textContent = sub;
  document.getElementById('celebOverlay').classList.add('open');
  if (navigator.vibrate) navigator.vibrate([200, 80, 200, 80, 300]);
}

function closeCelebration() {

}

async function shareCelebration() {
  const training = SCHEDULE[currentDay];
  const title = training ? TREINOS[training].label : 'Cardio';
  const text = '💪 Mais um treino concluído! ' + title + ' • KV Coach 🏆';

  try {
    const imgBlob = await generateCelebrationImage(title);
    if (navigator.canShare && navigator.canShare({ files: [new File([imgBlob], 'treino.png', { type: 'image/png' })] })) {
      const file = new File([imgBlob], 'treino.png', { type: 'image/png' });
      await navigator.share({ files: [file], title: 'Treino Concluído', text: text });
      return;
    }
  } catch (e) { /* fallback below */ }

  // Fallback: share text only, or copy to clipboard
  if (navigator.share) {
    try { await navigator.share({ title: 'Treino Concluído', text: text }); return; } catch(e) {}
  }
  try {
    await navigator.clipboard.writeText(text);
    alert('Mensagem copiada! Cole no seu Stories do Instagram.');
  } catch(e) {
    alert(text);
  }
}

// Gera uma imagem simples de celebração para compartilhar (formato story 9:16)
function generateCelebrationImage(title) {
  return new Promise((resolve) => {
    const canvas = document.createElement('canvas');
    canvas.width = 1080; canvas.height = 1920;
    const ctx = canvas.getContext('2d');

    // Background gradient
    const grad = ctx.createLinearGradient(0, 0, 0, 1920);
    grad.addColorStop(0, '#1a1300');
    grad.addColorStop(1, '#0d0d0d');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, 1080, 1920);

    // Accent border
    ctx.strokeStyle = '#f5a623';
    ctx.lineWidth = 6;
    ctx.strokeRect(40, 40, 1000, 1840);

    ctx.textAlign = 'center';

    // Logo
    ctx.fillStyle = '#f5a623';
    ctx.font = 'bold 36px Arial';
    ctx.fillText('KV COACH', 540, 260);

    // Trophy emoji
    ctx.font = '180px Arial';
    ctx.fillText('🏆', 540, 620);

    // Title
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 64px Arial';
    ctx.fillText('TREINO', 540, 780);
    ctx.fillText('CONCLUÍDO!', 540, 860);

    // Training name
    ctx.fillStyle = '#f5a623';
    ctx.font = 'bold 48px Arial';
    wrapText(ctx, title, 540, 980, 900, 56);

    // Date
    ctx.fillStyle = '#999999';
    ctx.font = '36px Arial';
    const dateStr = new Date().toLocaleDateString('pt-BR', {weekday:'long', day:'numeric', month:'long'});
    ctx.fillText(dateStr, 540, 1700);

    // Name
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 44px Arial';
    ctx.fillText('Leonardo Pereira', 540, 1780);

    canvas.toBlob((blob) => resolve(blob), 'image/png');
  });
}

function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
  const words = text.split(' ');
  let line = '';
  let lines = [];
  words.forEach(word => {
    const testLine = line + word + ' ';
    if (ctx.measureText(testLine).width > maxWidth && line) {
      lines.push(line);
      line = word + ' ';
    } else {
      line = testLine;
    }
  });
  lines.push(line);
  const startY = y - ((lines.length - 1) * lineHeight) / 2;
  lines.forEach((l, i) => ctx.fillText(l.trim(), x, startY + i * lineHeight));
}

function countDoneDays() { return [0,1,2,3,4,5,6].filter(d => isDayDone(d)).length; }

function switchDay(dow) {
  currentDay = dow;
  renderWeekBar();
  renderContent(dow);
}

function getAllExForDay(dow) {
  const t = SCHEDULE[dow];
  if (!t) return [];
  const doAbs = ABS_DAYS.includes(dow);
  return TREINOS[t].exercises.concat(doAbs ? getAbsForDay(dow) : []);
}

// Gera versões dos exercícios de abdominal com ID único por dia,
// para que marcar OK em um dia não afete outros dias com abdominal.
function getAbsForDay(dow) {
  return AB_EXERCISES.map(ex => Object.assign({}, ex, { id: ex.id + '_d' + dow, baseId: ex.id }));
}

function renderContent(dow) {
  const content = document.getElementById('content');
  const training = SCHEDULE[dow];

  if (!training) {
    document.getElementById('todayTitle').textContent = '— Descanso —';
    document.getElementById('todayFocus').textContent = 'Recuperação ativa. Você merece!';
    content.innerHTML = '<div class="rest-screen"><div class="rest-icon">🛌</div><div class="rest-title">Dia de Descanso</div><div class="rest-sub">Recuperação é parte do treino.<br>Hidrate-se bem e descanse!</div></div>'
      + buildCardioCard(60, dow);
    document.getElementById('todayPct').textContent = isCardioDone(dow) ? '100%' : '0%';
    updateWeekProgress();
    return;
  }

  const treino = TREINOS[training];
  document.getElementById('todayTitle').textContent = treino.label;
  document.getElementById('todayFocus').textContent = treino.focus;

  const maxRep = treino.exercises[0]?.reps?.split('–')[1] || '8';
  let html = '<details class="tip-box"><summary><strong>📐 Progressão</strong> (toque para ver)</summary>' +
    '<div style="margin-top:8px">Tente manter o mesmo nº de reps nas séries. Só suba a carga na próxima semana se atingir o teto máximo (' + maxRep + ' reps) em todas as séries. O ✓ de cada série inicia o timer de descanso automaticamente.</div></details>';
  html += '<div class="section-label">Exercícios</div>';
  treino.exercises.forEach((ex, idx) => { html += buildExCard(ex, idx + 1); });

  const doAbs = ABS_DAYS.includes(dow);
  if (doAbs) {
    html += '<div class="section-label">🔥 Abdominal (dia sim)</div>';
    getAbsForDay(dow).forEach((ex, idx) => { html += buildExCard(ex, idx + 1); });
  }

  html += buildCardioCard(45, dow);

  content.innerHTML = html;
  updateDayProgress(getAllExForDay(dow), dow);
  updateWeekProgress();
}

function buildExCard(ex, num) {
  const totalDone = countSeriesDone(ex);
  const allDone = totalDone === ex.sets;
  const isOpen = openCards[ex.id] || false;

  let pips = ex.warmup ? '<div class="pip warmup"></div>' : '';
  for (let s = 1; s <= ex.sets; s++) {
    pips += '<div class="pip ' + (getSerieData(ex.id,s).done?'done':'') + '"></div>';
  }

  const noteVal = state['note_'+ex.id] || '';
  const progData = checkProgression(ex);
  const restLabel = ex.rest >= 90 ? '1:30–2:30' : '1:00–2:00';
  const icon = GROUP_ICONS[ex.grp] || '🏋️';
  const vidLink = videoLinkFor(ex);

  return '<div class="ex-card ' + (allDone?'completed':'') + ' ' + (isOpen?'open':'') + '" id="card_'+ex.id+'">' +
    '<div class="ex-header" onclick="toggleCard(\''+ex.id+'\')">' +
      '<div class="ex-num">' + (allDone?'✓':num) + '</div>' +
      '<div class="ex-info">' +
        '<div class="ex-name">' + ex.name + '</div>' +
        '<div class="ex-meta">' + (ex.warmup?'1×'+ex.warmup.reps+' aquec + ':'') + ex.sets+'×'+ex.reps+' reps · ⏱ '+restLabel+'min</div>' +
        (ex.note?'<div class="ex-meta" style="color:#666;font-style:italic">'+ex.note+'</div>':'') +
        '<a class="video-link" href="'+vidLink+'" target="_blank" onclick="event.stopPropagation()">▶ Ver execução</a>' +
      '</div>' +
      '<div class="ex-chevron">⌄</div>' +
    '</div>' +
    '<div class="series-wrap" id="sw_'+ex.id+'">' +
      (ex.warmup?'<div style="margin-bottom:8px;padding:8px 0;border-bottom:1px dashed var(--border)"><div style="font-size:11px;color:var(--muted);margin-bottom:4px;font-weight:700;text-transform:uppercase;letter-spacing:1px">Aquecimento — 1×'+ex.warmup.reps+' reps (sem falha)</div><input class="serie-input" placeholder="kg" style="width:80px" id="w_'+ex.id+'" value="'+(state['w_'+ex.id]||'')+'" oninput="saveWarmup(\''+ex.id+'\',this.value)"></div>':'') +
      '<div class="series-header"><div>Série</div><div>kg</div><div>Reps</div><div></div></div>' +
      buildSeriesRows(ex) +
      '<div class="pips">' + pips + '</div>' +
      '<div class="prog-badge' + (progData?' show':'') + '">' + (progData?'🏆 '+progData:'') + '</div>' +
      '<div class="note-label">📝 Observações</div>' +
      '<textarea class="note-input" rows="2" placeholder="Anotações, sensações, ajustes..." id="note_'+ex.id+'" oninput="saveNote(\''+ex.id+'\',this.value)">'+noteVal+'</textarea>' +
    '</div>' +
  '</div>';
}

function buildCardioCard(minutes, dow) {
  const done = isCardioDone(dow);
  return '<div class="section-label">🏃 Cardio</div>' +
    '<div class="ex-card cardio-card ' + (done ? 'completed' : '') + '" id="card_cardio">' +
      '<div class="ex-header" onclick="toggleCardio(' + dow + ')" style="cursor:pointer">' +
        '<div class="ex-num">' + (done ? '✓' : '🏃') + '</div>' +
        '<div class="ex-info">' +
          '<div class="ex-name">Cardio — ' + minutes + ' minutos</div>' +
          '<div class="ex-meta">Esteira, bike ou elíptico, em ritmo constante.</div>' +
        '</div>' +
        '<button class="check-btn ' + (done ? 'done' : '') + '" id="chk_cardio" onclick="event.stopPropagation();toggleCardio(' + dow + ')">✓</button>' +
      '</div>' +
    '</div>';
}

function toggleCardio(dow) {
  const k = 'cardio_' + dow;
  if (state[k]) {
    // Desmarcar: remove completamente
    delete state[k];
  } else {
    // Marcar: salva com a data real de hoje
    state[k] = { done: true, date: todayISO() };
  }
  saveState();
  const done = !!state[k];
  const card = document.getElementById('card_cardio');
  const chk = document.getElementById('chk_cardio');
  const num = card?.querySelector('.ex-num');
  card?.classList.toggle('completed', done);
  chk?.classList.toggle('done', done);
  if (num) num.textContent = done ? '✓' : '🏃';

  // Update day %, week bar/progress
  if (SCHEDULE[currentDay]) {
    updateDayProgress(getAllExForDay(currentDay), currentDay);
  } else {
    document.getElementById('todayPct').textContent = done ? '100%' : '0%';
  }
  updateWeekProgress();
  renderWeekBar();
  checkDayCompletion();
}

function buildSeriesRows(ex) {
  let html = '';
  for (let s = 1; s <= ex.sets; s++) {
    const sd = getSerieData(ex.id, s);
    html += '<div class="series-row" id="row_'+ex.id+'_'+s+'">' +
      '<div class="serie-badge '+(sd.done?'done':'')+'" id="badge_'+ex.id+'_'+s+'">'+s+'</div>' +
      '<input class="serie-input '+(sd.kg?'filled':'')+'" type="number" inputmode="decimal" placeholder="kg" value="'+(sd.kg||'')+'" id="kg_'+ex.id+'_'+s+'" oninput="onSerieChange(\''+ex.id+'\','+s+',\'kg\',this.value)">' +
      '<input class="serie-input '+(sd.reps?'filled':'')+'" type="number" inputmode="numeric" placeholder="reps" value="'+(sd.reps||'')+'" id="reps_'+ex.id+'_'+s+'" oninput="onSerieChange(\''+ex.id+'\','+s+',\'reps\',this.value)">' +
      '<button class="check-btn '+(sd.done?'done':'')+'" id="chk_'+ex.id+'_'+s+'" onclick="toggleSerieDone(\''+ex.id+'\','+s+')">✓</button>' +
    '</div>';
  }
  return html;
}

function countSeriesDone(ex) {
  let n = 0;
  for (let s = 1; s <= ex.sets; s++) { if (getSerieData(ex.id,s).done) n++; }
  return n;
}

function checkProgression(ex) {
  const maxRep = parseInt((ex.reps.split('–')[1]||ex.reps).toString().trim());
  for (let s = 1; s <= ex.sets; s++) {
    const sd = getSerieData(ex.id,s);
    if (!sd.done || !sd.reps || parseInt(sd.reps) < maxRep) return null;
  }
  return 'Atingiu '+maxRep+' reps em todas as séries! Suba a carga na próxima semana. 💪';
}

// ══════════════════════════════════════════════
//  INTERACTIONS
// ══════════════════════════════════════════════
function toggleCard(exId) {
  openCards[exId] = !openCards[exId];
  const card = document.getElementById('card_'+exId);
  if (card) card.classList.toggle('open', openCards[exId]);
}

function onSerieChange(exId, serie, field, value) {
  setSerieData(exId, serie, field, value);
  const inp = document.getElementById(field+'_'+exId+'_'+serie);
  if (inp) inp.classList.toggle('filled', !!value);
}

function toggleSerieDone(exId, serie) {
  const sd = getSerieData(exId, serie);
  const newDone = !sd.done;
  setSerieData(exId, serie, 'done', newDone);

  document.getElementById('badge_'+exId+'_'+serie)?.classList.toggle('done', newDone);
  document.getElementById('chk_'+exId+'_'+serie)?.classList.toggle('done', newDone);

  refreshPips(exId);
  refreshCardDone(exId);
  refreshProgBadge(exId);
  updateDayProgress(getAllExForDay(currentDay), currentDay);
  updateWeekProgress();
  renderWeekBar();
  checkDayCompletion();

  // Launch timer when marking DONE (not when un-marking)
  if (newDone) {
    const allEx = getAllExForDay(currentDay);
    const ex = allEx.find(e => e.id === exId);
    if (ex) {
      // Find next undone serie or next exercise
      let nextLabel = '';
      const totalDone = countSeriesDone(ex);
      if (totalDone < ex.sets) {
        nextLabel = ex.name + ' · Série ' + (totalDone + 1);
      } else {
        const exIdx = allEx.indexOf(ex);
        if (exIdx >= 0 && exIdx < allEx.length - 1) {
          nextLabel = allEx[exIdx+1].name;
        }
      }
      startTimer(ex.name, nextLabel, ex.rest);
    }
  }
}

function refreshPips(exId) {
  const sw = document.getElementById('sw_'+exId);
  if (!sw) return;
  const pips = sw.querySelectorAll('.pip:not(.warmup)');
  pips.forEach((pip, idx) => {
    pip.classList.toggle('done', !!getSerieData(exId, idx+1).done);
  });
}

function refreshCardDone(exId) {
  const allEx = getAllExForDay(currentDay);
  const ex = allEx.find(e => e.id === exId);
  if (!ex) return;
  const allDone = countSeriesDone(ex) === ex.sets;
  const card = document.getElementById('card_'+exId);
  if (card) {
    card.classList.toggle('completed', allDone);
    const num = card.querySelector('.ex-num');
    if (num) {
      const treinoIdx = TREINOS[SCHEDULE[currentDay]]?.exercises.indexOf(ex);
      const absIdx = getAbsForDay(currentDay).findIndex(e => e.id === exId);
      const displayNum = treinoIdx >= 0 ? treinoIdx + 1 : (absIdx >= 0 ? absIdx + 1 : '');
      num.textContent = allDone ? '✓' : displayNum;
    }
  }
}

function refreshProgBadge(exId) {
  const allEx = getAllExForDay(currentDay);
  const ex = allEx.find(e => e.id === exId);
  if (!ex) return;
  const prog = checkProgression(ex);
  const badge = document.querySelector('#card_'+exId+' .prog-badge');
  if (badge) { badge.textContent = prog ? '🏆 '+prog : ''; badge.classList.toggle('show', !!prog); }
}

function saveWarmup(exId, val) { state['w_'+exId] = val; saveState(); }
function saveNote(exId, val) { state['note_'+exId] = val; saveState(); }

function updateDayProgress(exercises, dow) {
  let done = 0, total = 0;
  exercises.forEach(ex => { total += ex.sets; done += countSeriesDone(ex); });
  // Cardio counts as +1 unit toward the day's total
  total += 1;
  if (isCardioDone(dow !== undefined ? dow : currentDay)) done += 1;
  document.getElementById('todayPct').textContent = (total > 0 ? Math.round(done/total*100) : 0) + '%';
}

function updateWeekProgress() {
  const done = countDoneDays();
  document.getElementById('weekLabel').textContent = done+'/7 dias';
  document.getElementById('weekFill').style.width = (done/7*100)+'%';
}

// ══════════════════════════════════════════════
//  HISTORY (3 níveis: Semana → Dia → Exercícios)
// ══════════════════════════════════════════════
function openHistory() {
  const weeks = [];
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && k.startsWith('treino_leo_')) weeks.push(k);
  }
  weeks.sort().reverse();

  const content = document.getElementById('histContent');
  if (!weeks.length) {
    content.innerHTML = '<p style="color:var(--muted);font-size:13px">Nenhum histórico ainda. Complete sua primeira série!</p>';
    document.getElementById('histModal').classList.add('open');
    return;
  }

  // ── Guia de carga: referência colapsável por treino ──
  // Busca a sessão mais recente de cada treino em qualquer semana
  const lastSessionByTreino = {};
  weeks.forEach(wk => {
    const wData = JSON.parse(localStorage.getItem(wk) || '{}');
    Object.entries(TREINOS).forEach(([t, data]) => {
      if (lastSessionByTreino[t]) return; // já encontrou a mais recente (weeks está desc)
      const hasData = data.exercises.some(ex => {
        for (let s = 1; s <= ex.sets; s++) {
          if (wData[ex.id+'_'+s]?.kg) return true;
        }
        return false;
      });
      if (hasData) lastSessionByTreino[t] = wData;
    });
  });

  let html = '';
  const treinoLetters = Object.keys(TREINOS);
  const hasAnyGuide = treinoLetters.some(t => lastSessionByTreino[t]);
  if (hasAnyGuide) {
    html += '<div style="font-size:11px;color:var(--accent);font-weight:800;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">📌 Referência de cargas</div>';
    treinoLetters.forEach(t => {
      const wData = lastSessionByTreino[t];
      const data = TREINOS[t];
      if (!wData) {
        html += '<div class="guide-treino-row" id="guide_'+t+'">';
        html += '<div class="guide-treino-header" onclick="toggleGuide(\''+t+'\')">';
        html += '<span class="guide-treino-badge">'+t+'</span>';
        html += '<span class="guide-treino-meta">'+data.focus+'</span>';
        html += '<span style="color:var(--muted);font-size:11px">Sem dados ▸</span>';
        html += '</div></div>';
        return;
      }
      // Get last execution date for this treino
      let latestDate = null;
      data.exercises.forEach(ex => {
        for (let s = 1; s <= ex.sets; s++) {
          const d = wData[ex.id+'_'+s];
          if (d?.date && (!latestDate || d.date > latestDate)) latestDate = d.date;
        }
      });

      html += '<div class="guide-treino-row" id="guide_'+t+'">';
      html += '<div class="guide-treino-header" onclick="toggleGuide(\''+t+'\')">';
      html += '<span class="guide-treino-badge">'+t+'</span>';
      html += '<div style="flex:1">';
      html += '<div class="guide-treino-meta">'+data.focus+'</div>';
      if (latestDate) html += '<div style="font-size:10px;color:var(--muted)">Última: '+formatDateBR(latestDate)+'</div>';
      html += '</div>';
      html += '<span class="guide-treino-chevron">⌄</span>';
      html += '</div>';
      html += '<div class="guide-treino-body" id="guidebody_'+t+'">';
      data.exercises.forEach(ex => {
        const refKg = getReferenceLoad(ex, wData);
        if (refKg === null) return;
        const maxRep = parseInt((ex.reps.split('–')[1]||ex.reps).toString().trim());
        const up = checkProgressionFromData(ex, wData, maxRep);
        html += '<div class="guide-ex-row">';
        html += '<span class="guide-ex-name">'+ex.name+'</span>';
        html += '<span class="guide-ex-kg'+(up?' guide-ex-up':'')+'">'+refKg+'kg'+(up?' ⬆':'')+'</span>';
        html += '</div>';
      });
      html += '</div></div>';
    });
    html += '<div style="margin-bottom:14px"></div>';
  }

  // ── Semanas ──
  weeks.forEach((wk, wIdx) => {
    const wData = JSON.parse(localStorage.getItem(wk) || '{}');
    const weekDate = wk.replace('treino_leo_week_','');
    const isFirst = wIdx === 0;
    const weekDays = buildWeekDays(wData, weekDate);
    if (!weekDays.length) return;

    html += '<details class="hist-week"' + (isFirst ? ' open' : '') + '>';
    html += '<summary class="hist-week-summary">';
    html += '<span>Semana de ' + formatDateBR(weekDate) + '</span>';
    html += '<span class="chevron">⌄</span></summary>';
    html += '<div class="hist-week-body">';

    weekDays.forEach(day => {
      const training = day.training;
      const label = training ? TREINOS[training]?.label : 'Descanso';
      const focus = training ? TREINOS[training]?.focus : '';

      html += '<details class="hist-day">';
      html += '<summary class="hist-day-summary">';
      html += '<span class="hist-day-badge' + (training ? '' : ' rest') + '">' + (training || '—') + '</span>';
      html += '<div>';
      html += '<div class="hist-day-meta">' + label + (focus ? ' · ' + focus : '') + '</div>';
      html += '<div class="hist-day-date">' + day.dateLabel + '</div>';
      html += '</div>';
      html += '<span class="hist-day-chevron">⌄</span>';
      html += '</summary>';
      html += '<div class="hist-day-body">';

      day.exercises.forEach(ex => {
        if (!ex.isCardio && !ex.isAbs && (!ex.lines || !ex.lines.length)) return;
        html += '<div class="hist-ex">';

        if (ex.isCardio) {
          html += '<div class="hist-ex-name">🏃 Cardio — ' + ex.mins + 'min ✓</div>';
        } else if (ex.isAbs) {
          html += '<div class="hist-ex-name">🔥 Abdominal completo ✓</div>';
        } else {
          html += '<div class="hist-ex-name">' + ex.name + '</div>';
          html += '<div class="hist-ex-sets">' + ex.lines.join(' · ') + '</div>';
          if (ex.refKg !== null) {
            html += '<span class="ref-load' + (ex.hitMax ? ' ref-load-prog' : '') + '">';
            html += (ex.hitMax ? '🏆 Subir de ' : '📌 ') + ex.refKg + 'kg';
            html += '</span>';
          }
          if (ex.note) html += '<div class="hist-note">📝 ' + ex.note + '</div>';
        }
        html += '</div>';
      });

      html += '</div></details>';
    });

    html += '</div></details>';
  });

  content.innerHTML = html;
  document.getElementById('histModal').classList.add('open');
}

// Constrói os dias com treino para uma semana, agrupados por data de execução
function buildWeekDays(wData, weekMonday) {
  const daysByDate = {};

  // Exercícios de força
  Object.entries(TREINOS).forEach(([t, data]) => {
    data.exercises.forEach(ex => {
      for (let s = 1; s <= ex.sets; s++) {
        const d = wData[ex.id+'_'+s];
        if (!d) continue;
        const dateKey = d.date || weekMonday;
        if (!daysByDate[dateKey]) daysByDate[dateKey] = { training: t, exercises: [] };
        // Add exercise entry if not already there
        if (!daysByDate[dateKey].exercises.find(e => e.id === ex.id)) {
          const lines = [];
          for (let ss = 1; ss <= ex.sets; ss++) {
            const dd = wData[ex.id+'_'+ss] || {};
            if (dd.kg || dd.reps) lines.push('S'+ss+': '+(dd.kg||'?')+'kg × '+(dd.reps||'?'));
          }
          const maxRep = parseInt((ex.reps.split('–')[1]||ex.reps).toString().trim());
          const refKg = getReferenceLoad(ex, wData);
          const hitMax = refKg !== null && checkProgressionFromData(ex, wData, maxRep);
          daysByDate[dateKey].exercises.push({
            id: ex.id, name: ex.name, lines,
            refKg, hitMax,
            note: wData['note_'+ex.id] || ''
          });
        }
        break; // only need the first series to establish the date
      }
    });
  });

  // Abdominal por dia
  [0,1,2,3,4,5,6].forEach(dow => {
    if (!ABS_DAYS.includes(dow)) return;
    const hasAbs = AB_EXERCISES.some(ex => {
      const id = ex.id+'_d'+dow;
      for (let s = 1; s <= ex.sets; s++) { if (wData[id+'_'+s]?.done) return true; }
      return false;
    });
    if (!hasAbs) return;
    // Find the date for this dow within the week
    const weekStart = new Date(weekMonday + 'T00:00:00');
    const dayOffset = (dow === 0 ? 6 : dow - 1); // Mon=0...Sun=6
    const date = new Date(weekStart); date.setDate(weekStart.getDate() + dayOffset);
    const dateKey = localISODate(date);
    if (!daysByDate[dateKey]) daysByDate[dateKey] = { training: SCHEDULE[dow], exercises: [] };
    daysByDate[dateKey].exercises.push({ isAbs: true, absDone: true });
  });

  // Cardio por dia — usa a data real armazenada (novo formato) ou calcula pelo offset (formato antigo)
  [0,1,2,3,4,5,6].forEach(dow => {
    const cardioVal = wData['cardio_'+dow];
    if (!cardioVal) return;
    const isCardioDoneVal = cardioVal === true || (cardioVal && cardioVal.done);
    if (!isCardioDoneVal) return;
    // Prefere data real salva; fallback: offset do dow dentro da semana
    let dateKey = cardioVal.date || null;
    if (!dateKey) {
      const weekStart = new Date(weekMonday + 'T00:00:00');
      const dayOffset = (dow === 0 ? 6 : dow - 1);
      const date = new Date(weekStart); date.setDate(weekStart.getDate() + dayOffset);
      dateKey = localISODate(date);
    }
    const mins = SCHEDULE[dow] ? 45 : 60;
    if (!daysByDate[dateKey]) daysByDate[dateKey] = { training: SCHEDULE[dow], exercises: [] };
    daysByDate[dateKey].exercises.push({ isCardio: true, cardioDone: true, mins });
  });

  return Object.entries(daysByDate)
    .sort((a,b) => b[0].localeCompare(a[0])) // most recent first
    .map(([date, day]) => ({ ...day, dateLabel: formatDateBR(date) }));
}

// Carga de referência (maior kg em qualquer série)
function getReferenceLoad(ex, wData) {
  let maxKg = null;
  for (let s = 1; s <= ex.sets; s++) {
    const kg = parseFloat(wData[ex.id+'_'+s]?.kg);
    if (!isNaN(kg) && (maxKg === null || kg > maxKg)) maxKg = kg;
  }
  return maxKg;
}

function checkProgressionFromData(ex, wData, maxRep) {
  for (let s = 1; s <= ex.sets; s++) {
    const d = wData[ex.id+'_'+s];
    if (!d?.done || !d.reps || parseInt(d.reps) < maxRep) return false;
  }
  return true;
}

// ══════════════════════════════════════════════
//  CHARTS — lista colapsável, gráfico inline
// ══════════════════════════════════════════════
function openCharts() {
  const weeks = [];
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && k.startsWith('treino_leo_')) weeks.push(k);
  }
  weeks.sort(); // oldest first for chart progression

  const allEx = [];
  Object.entries(TREINOS).forEach(([t, data]) => {
    data.exercises.forEach(ex => allEx.push({ ...ex, treinoLabel: t }));
  });

  const list = document.getElementById('chartExList');

  if (!weeks.length) {
    list.innerHTML = '<p style="color:var(--muted);font-size:13px;padding:8px 0">Registre cargas em pelo menos uma semana para ver a evolução.</p>';
    document.getElementById('chartModal').classList.add('open');
    return;
  }

  let html = '';
  allEx.forEach(ex => {
    // Collect data points across all weeks
    const points = [];
    weeks.forEach(wk => {
      const d = JSON.parse(localStorage.getItem(wk) || '{}');
      const kg = getReferenceLoad(ex, d);
      if (kg !== null) points.push({ label: formatDateBR(wk.replace('treino_leo_week_','')).slice(0,5), kg });
    });

    html += '<div class="chart-ex-row" id="crow_'+ex.id+'">';
    html += '<div class="chart-ex-row-header" onclick="toggleChartRow(\''+ex.id+'\')">';
    html += '<div>';
    html += '<span class="chart-ex-row-treino">Treino ' + ex.treinoLabel + '</span><br>';
    html += '<span class="chart-ex-row-name">' + ex.name + '</span>';
    html += '</div>';
    html += '<span class="chart-ex-row-chevron">⌄</span>';
    html += '</div>';
    html += '<div class="chart-ex-row-body" id="cbody_'+ex.id+'">';
    if (!points.length) {
      html += '<div class="chart-no-data">Sem dados ainda para este exercício.</div>';
    } else {
      html += '<canvas id="ccanvas_'+ex.id+'" style="width:100%;display:block"></canvas>';
      // Store points as data attribute for rendering after DOM insertion
      html += '<script type="application/json" id="cdata_'+ex.id+'">' + JSON.stringify(points) + '<\/script>';
    }
    html += '</div></div>';
  });

  list.innerHTML = html;
  document.getElementById('chartModal').classList.add('open');
}

function toggleChartRow(exId) {
  const row = document.getElementById('crow_'+exId);
  const isOpen = row.classList.contains('open');
  // Close all others
  document.querySelectorAll('.chart-ex-row.open').forEach(r => r.classList.remove('open'));
  if (!isOpen) {
    row.classList.add('open');
    // Render chart after a frame so the body is visible and has dimensions
    requestAnimationFrame(() => {
      const dataEl = document.getElementById('cdata_'+exId);
      const canvas = document.getElementById('ccanvas_'+exId);
      if (dataEl && canvas) {
        const points = JSON.parse(dataEl.textContent);
        drawChart(canvas, points, exId);
      }
    });
  }
}

function drawChart(canvas, points, exId) {
  const allEx = [];
  Object.values(TREINOS).forEach(t => t.exercises.forEach(ex => allEx.push(ex)));
  const ex = allEx.find(e => e.id === exId);

  const W = canvas.parentElement.clientWidth - 24;
  const H = Math.round(W * 0.52);
  const DPR = window.devicePixelRatio || 1;
  canvas.width = W * DPR;
  canvas.height = H * DPR;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';

  const ctx = canvas.getContext('2d');
  ctx.scale(DPR, DPR);

  const pad = { top: 28, right: 16, bottom: 38, left: 46 };
  const cW = W - pad.left - pad.right;
  const cH = H - pad.top - pad.bottom;

  const kgs = points.map(p => p.kg);
  const minKg = Math.max(0, Math.min(...kgs) * 0.85);
  const maxKg = Math.max(...kgs) * 1.12;
  const range = maxKg - minKg || 1;

  const toX = i => pad.left + (points.length < 2 ? cW/2 : (i / (points.length - 1)) * cW);
  const toY = kg => pad.top + cH - ((kg - minKg) / range) * cH;

  // Background (compatible — no roundRect)
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(0, 0, W, H);

  // Grid
  ctx.strokeStyle = '#2a2a2a';
  ctx.lineWidth = 1;
  const gridLines = 3;
  for (let i = 0; i <= gridLines; i++) {
    const y = pad.top + (i / gridLines) * cH;
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(W - pad.right, y); ctx.stroke();
    const val = maxKg - (i / gridLines) * range;
    ctx.fillStyle = '#555';
    ctx.font = '10px Arial';
    ctx.textAlign = 'right';
    ctx.fillText(Math.round(val) + 'kg', pad.left - 4, y + 4);
  }

  if (points.length === 1) {
    // Single point — just show dot + label
    const x = toX(0), y = toY(points[0].kg);
    ctx.beginPath();
    ctx.arc(x, y, 6, 0, Math.PI * 2);
    ctx.fillStyle = '#f5a623'; ctx.fill();
    ctx.fillStyle = '#f5a623';
    ctx.font = 'bold 12px Arial'; ctx.textAlign = 'center';
    ctx.fillText(points[0].kg + 'kg', x, y - 12);
    ctx.fillStyle = '#555'; ctx.font = '10px Arial';
    ctx.fillText(points[0].label, x, H - pad.bottom + 14);
  } else {
    // Gradient fill
    const grad = ctx.createLinearGradient(0, pad.top, 0, pad.top + cH);
    grad.addColorStop(0, 'rgba(245,166,35,0.28)');
    grad.addColorStop(1, 'rgba(245,166,35,0.02)');
    ctx.beginPath();
    ctx.moveTo(toX(0), toY(points[0].kg));
    for (let i = 1; i < points.length; i++) ctx.lineTo(toX(i), toY(points[i].kg));
    ctx.lineTo(toX(points.length - 1), pad.top + cH);
    ctx.lineTo(toX(0), pad.top + cH);
    ctx.closePath();
    ctx.fillStyle = grad; ctx.fill();

    // Line
    ctx.beginPath();
    ctx.strokeStyle = '#f5a623'; ctx.lineWidth = 2.5; ctx.lineJoin = 'round';
    points.forEach((p, i) => i === 0 ? ctx.moveTo(toX(i), toY(p.kg)) : ctx.lineTo(toX(i), toY(p.kg)));
    ctx.stroke();

    // Dots + labels
    points.forEach((p, i) => {
      const x = toX(i), y = toY(p.kg);
      ctx.beginPath(); ctx.arc(x, y, 5, 0, Math.PI * 2);
      ctx.fillStyle = '#f5a623'; ctx.fill();
      ctx.strokeStyle = '#111'; ctx.lineWidth = 1.5; ctx.stroke();

      ctx.fillStyle = '#f5a623';
      ctx.font = 'bold 11px Arial'; ctx.textAlign = 'center';
      ctx.fillText(p.kg + 'kg', x, y - 10);

      ctx.fillStyle = '#555'; ctx.font = '10px Arial';
      ctx.fillText(p.label, x, H - pad.bottom + 14);
    });

    // Arrow or highlight on last point if higher than first
    if (points[points.length-1].kg > points[0].kg) {
      const lx = toX(points.length-1), ly = toY(points[points.length-1].kg);
      ctx.fillStyle = '#4ade80';
      ctx.font = 'bold 12px Arial'; ctx.textAlign = 'center';
      ctx.fillText('⬆', lx + 12, ly - 4);
    }
  }

  // Exercise name at top
  ctx.fillStyle = '#888';
  ctx.font = '10px Arial'; ctx.textAlign = 'left';
  const shortName = (ex?.name || '').length > 35 ? (ex?.name || '').slice(0,33) + '…' : (ex?.name || '');
  ctx.fillText(shortName, pad.left, 16);
}

function closeCharts() {
  document.getElementById('chartModal').classList.remove('open');
}

// ══════════════════════════════════════════════
//  BOOT
// ══════════════════════════════════════════════
init();
</script>
